id: create-file
name: "Create Your First File"
description: |
  Create a file named `hello-linux.txt` inside the `/challenge` directory.
solution: |
  ## Steps
  1. Create the file using `touch`:
     ```
     touch /challenge/hello-linux.txt
     ```
  2. Verify it exists:
     ```
     ls /challenge/
     ```

level: user
groups: [basics]
domain: essential-commands
nodes:
  - name: node
    type: container
    image: ubuntu:24.04
    primary: true
    given:
      - command: "mkdir -p /challenge"
expected:
  - description: "/challenge/hello-linux.txt must exist"
    check: "test -f /challenge/hello-linux.txt"