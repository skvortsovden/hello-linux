id: socket-activation
name: "systemd Socket Activation"
level: senior
description: |
  Create a **socket-activated** service using systemd. Instead of a service
  that runs continuously, systemd will listen on TCP port **9000** and only
  launch your handler when an incoming connection actually arrives. The handler
  must respond with `hello linux` and then exit.

  This is the same mechanism systemd uses to start services like SSH and DBus
  on-demand — and it's the foundation that modern container runtimes build on.
solution: |
  ### 1. Create the handler script
  ```
  cat > /challenge/handler.sh << 'EOF'
  #!/bin/bash
  echo "hello linux"
  EOF
  chmod +x /challenge/handler.sh
  ```

  ### 2. Create the socket unit
  ```
  cat > /etc/systemd/system/hello.socket << 'EOF'
  [Unit]
  Description=Hello Linux Socket

  [Socket]
  ListenStream=9000
  Accept=yes

  [Install]
  WantedBy=sockets.target
  EOF
  ```

  ### 3. Create the service template unit
  ```
  cat > /etc/systemd/system/hello@.service << 'EOF'
  [Unit]
  Description=Hello Linux Handler (instance %i)

  [Service]
  ExecStart=/challenge/handler.sh
  StandardInput=socket
  StandardOutput=socket
  StandardError=journal
  EOF
  ```

  ### 4. Reload, enable and start the socket
  ```
  systemctl daemon-reload
  systemctl enable --now hello.socket
  ```

  ### 5. Verify
  ```
  systemctl is-active hello.socket
  echo "" | nc -w2 localhost 9000
  ```
  You should see `hello linux` printed.

type: container
image: hello-linux/systemd-ubuntu:latest
systemd: true
given:
  - command: "apt-get install -y --no-install-recommends netcat-openbsd 2>/dev/null; mkdir -p /challenge"
expected:
  - description: "/challenge/handler.sh must exist and be executable"
    check: "test -x /challenge/handler.sh"
  - description: "/etc/systemd/system/hello.socket must exist"
    check: "test -f /etc/systemd/system/hello.socket"
  - description: "/etc/systemd/system/hello@.service template must exist"
    check: "test -f /etc/systemd/system/hello@.service"
  - description: "hello.socket must be active (listening)"
    check: "systemctl is-active hello.socket"
  - description: "connecting to port 9000 must return 'hello linux'"
    check: "echo '' | nc -w2 localhost 9000 | grep -q 'hello linux'"
