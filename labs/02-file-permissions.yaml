id: file-permissions
name: "Set File Permissions"
description: |
  ## Objective
  Make the file `/challenge/script.sh` executable by its **owner**.

  ## Steps
  1. Check the current permissions:
     ```
     ls -l /challenge/script.sh
     ```
  2. Add execute permission for the owner using `chmod`:
     ```
     chmod u+x /challenge/script.sh
     ```
  3. Verify the change:
     ```
     ls -l /challenge/script.sh
     ```
     You should see an `x` in the owner's position (e.g. `-rwxr--r--`).

  ## Hints
  - `u` refers to the **u**ser (owner), `g` to group, `o` to others.
  - `+x` adds the execute bit; `-x` removes it.
  - `chmod 744 /challenge/script.sh` is an equivalent numeric form.

type: container
image: alpine:latest
given:
  - command: "mkdir -p /challenge && touch /challenge/script.sh"
expected:
  - description: "script.sh must be executable by its owner"
    check: "test -x /challenge/script.sh"
