<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab — hello-linux</title>
  <link rel="stylesheet" href="/style.css" />

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <!-- marked (Markdown renderer) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a href="/" class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" y1="19" x2="20" y2="19"></line>
      </svg>
      hello-linux
    </a>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Labs
    </a>
  </header>

  <!-- Two-column lab layout -->
  <div class="lab-layout">

    <!-- ── Left panel: instructions ── -->
    <aside class="lab-panel-left">
      <div class="panel-body">
        <h1 class="lab-title">
          <span id="lab-name">Loading…</span>
        </h1>
        <div id="lab-description" class="lab-description"></div>
        <div id="lab-solution-wrap" style="display:none">
          <button class="btn-reveal" id="solution-toggle" onclick="toggleSolution()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span id="solution-toggle-label">Show Solution</span>
          </button>
          <div id="lab-solution" class="lab-description solution-content" style="display:none"></div>
        </div>
      </div>

      <div class="panel-footer">
        <button id="check-btn" class="btn-check" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Check Solution
        </button>
        <div id="result" class="result"></div>
      </div>
    </aside>

    <!-- ── Right panel: terminal ── -->
    <section class="lab-panel-right" style="position:relative">

      <!-- Status overlay (shown while provisioning) -->
      <div id="terminal-overlay" class="terminal-status">
        <div class="spinner"></div>
        <p id="status-text" class="status-text">Provisioning lab environment…</p>
      </div>

      <!-- macOS-style terminal title bar -->
      <div class="terminal-topbar">
        <span class="terminal-dot dot-red"></span>
        <span class="terminal-dot dot-yellow"></span>
        <span class="terminal-dot dot-green"></span>
        <span class="terminal-label" id="terminal-label">bash</span>
        <div id="terminal-tabs" class="terminal-tabs"></div>
      </div>

      <div id="terminal-container"></div>
    </section>
  </div>

  <!-- Matrix rain canvas (pass celebration) -->
  <canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:999;display:none"></canvas>

  <script>
    // ── Globals ──────────────────────────────────────────────────────────────
    const labId     = location.pathname.split('/').filter(Boolean).pop();
    let   sessionId = null;
    let   term      = null;
    let   fitAddon  = null;
    let   ws        = null;
    let   cleanedUp = false;
    // Multi-node tabs
    let   tabs      = [];   // [{ name, primary, term, fitAddon, ws, paneEl, tabBtn }]
    let   activeTab = null;

    const overlay     = document.getElementById('terminal-overlay');
    const statusText  = document.getElementById('status-text');
    const checkBtn    = document.getElementById('check-btn');
    const resultEl    = document.getElementById('result');

    // ── Initialise ───────────────────────────────────────────────────────────
    async function init() {
      // 1. Fetch lab metadata
      let lab;
      try {
        const r = await fetch(`/api/labs/${labId}`);
        if (!r.ok) throw new Error(`Lab "${labId}" not found`);
        lab = await r.json();
      } catch (err) {
        showFatalError(err.message);
        return;
      }

      document.title = `${lab.name} — hello-linux`;
      document.getElementById('lab-name').textContent = lab.name;

      const level = (lab.level || '').toLowerCase();
      if (level) {
        const levelBadge = document.createElement('span');
        levelBadge.textContent = level.charAt(0).toUpperCase() + level.slice(1);
        levelBadge.className   = `badge badge-${level}`;
        document.getElementById('lab-name').after(levelBadge);
      }

      document.getElementById('lab-description').innerHTML =
        marked.parse(lab.description || '_No description provided._');
      if (lab.solution) {
        document.getElementById('lab-solution').innerHTML = marked.parse(lab.solution);
        document.getElementById('lab-solution-wrap').style.display = '';
      }
      // 2. Create terminal(s)
      if (lab.nodes && lab.nodes.length > 0) {
        initMultiNodeTerminals(lab.nodes);
      } else {
        document.getElementById('terminal-label').textContent = `${lab.image} — bash`;
        initTerminal();
      }

      // 3. Provision environment
      setStatus('Provisioning lab environment…');
      try {
        const r = await fetch('/api/session', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ labId }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed to create session');
        sessionId = data.sessionId;
      } catch (err) {
        showFatalError(`Could not start lab: ${err.message}`);
        return;
      }

      // 4. Poll until environment is ready
      try {
        await waitForSession(sessionId);
      } catch (err) {
        showFatalError(err.message);
        return;
      }

      // 5. Connect WebSocket(s)
      setStatus('Connecting terminal…');
      if (tabs.length > 0) {
        connectAllTabWs();
      } else {
        connectWs();
      }
    }

    // ── xterm.js ─────────────────────────────────────────────────────────────
    const TERM_OPTIONS = {
      cursorBlink: true,
      fontSize:    14,
      fontFamily:  "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
      theme: {
        background:          '#1e1e2e',
        foreground:          '#cdd6f4',
        cursor:              '#f5e0dc',
        cursorAccent:        '#1e1e2e',
        selectionBackground: '#585b7066',
        black:               '#45475a', brightBlack:   '#585b70',
        red:                 '#f38ba8', brightRed:     '#f38ba8',
        green:               '#a6e3a1', brightGreen:   '#a6e3a1',
        yellow:              '#f9e2af', brightYellow:  '#f9e2af',
        blue:                '#89b4fa', brightBlue:    '#89b4fa',
        magenta:             '#f5c2e7', brightMagenta: '#f5c2e7',
        cyan:                '#89dceb', brightCyan:    '#89dceb',
        white:               '#bac2de', brightWhite:   '#a6adc8',
      },
      allowTransparency: false,
      scrollback:        3000,
    };

    function initTerminal() {
      term = new Terminal(TERM_OPTIONS);

      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      // Resize when the window changes
      const ro = new ResizeObserver(() => { if (fitAddon) fitAddon.fit(); });
      ro.observe(document.getElementById('terminal-container'));

      term.onResize(({ cols, rows }) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const cols  = term ? term.cols : 80;
      const rows  = term ? term.rows : 24;

      ws = new WebSocket(`${proto}//${location.host}/ws/${sessionId}?cols=${cols}&rows=${rows}`);

      ws.onopen = () => {
        hideOverlay();
        checkBtn.disabled = false;
        term.focus();
      };

      ws.onmessage = evt => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'data') {
            term.write(msg.data);
          } else if (msg.type === 'exit') {
            term.write(`\r\n\x1b[90m[Process exited with code ${msg.exitCode}]\x1b[0m\r\n`);
            checkBtn.disabled = true;
          }
        } catch (_) {
          term.write(evt.data);
        }
      };

      ws.onclose = () => {
        if (!cleanedUp) {
          term.write('\r\n\x1b[90m[Connection closed]\x1b[0m\r\n');
        }
        checkBtn.disabled = true;
      };

      ws.onerror = () => {
        term.write('\r\n\x1b[31m[WebSocket error]\x1b[0m\r\n');
      };

      term.onData(data => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', data }));
        }
      });
    }

    // ── Check Solution ────────────────────────────────────────────────────────
    checkBtn.addEventListener('click', async () => {
      if (!sessionId) return;

      checkBtn.disabled    = true;
      checkBtn.textContent = 'Checking…';
      resultEl.className   = 'result result-checking visible';
      resultEl.textContent = 'Running checks…';

      try {
        const r    = await fetch(`/api/validate/${sessionId}`, { method: 'POST' });
        const data = await r.json();

        if (data.passed) {
          resultEl.className = 'result result-pass visible';
          resultEl.innerHTML = '✅ All checks passed! Great work!';
          launchMatrixRain();
        } else {
          const lines = (data.results || [])
            .filter(c => !c.passed)
            .map(c => `❌ ${escHtml(c.description)}${c.error ? `<br><small style="opacity:.7">${escHtml(c.error)}</small>` : ''}`)
            .join('<br>');
          resultEl.className = 'result result-fail visible';
          resultEl.innerHTML = lines || '❌ Solution check failed.';
        }
      } catch (err) {
        resultEl.className = 'result result-fail visible';
        resultEl.textContent = `❌ Error: ${err.message}`;
      } finally {
        checkBtn.disabled    = false;
        checkBtn.innerHTML   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Check Solution`;
      }
    });

    // ── Cleanup ───────────────────────────────────────────────────────────────
    function cleanup() {
      if (cleanedUp || !sessionId) return;
      cleanedUp = true;
      navigator.sendBeacon(`/api/session/${sessionId}/destroy`);
      if (tabs.length > 0) {
        for (const tab of tabs) { try { tab.ws?.close(); } catch (_) {} }
      } else if (ws) {
        ws.close();
      }
    }

    window.addEventListener('pagehide', cleanup);

    // ── UI helpers ────────────────────────────────────────────────────────────
    function setStatus(msg) {
      overlay.classList.remove('hidden');
      statusText.textContent = msg;
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    function showFatalError(msg) {
      overlay.innerHTML = `
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <p style="color:#f87171;font-weight:600">${escHtml(msg)}</p>
        <a href="/" style="color:#7c6af7;font-size:.875rem">← Back to labs</a>`;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Matrix Rain ───────────────────────────────────────────────────────────
    function launchMatrixRain() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx    = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.style.display = '';

      const CHARS   = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
      const FONT_SZ = 16;
      const cols    = Math.floor(canvas.width / FONT_SZ);
      const drops   = Array.from({ length: cols }, () => Math.random() * -50);

      const DURATION = 4500; // ms total
      const FADE_AT  = 3000; // ms before end to start fading canvas out
      const start    = performance.now();
      let   frame;

      function draw(now) {
        const elapsed = now - start;
        if (elapsed >= DURATION) {
          canvas.style.display = 'none';
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          return;
        }

        // Global alpha fades out in final FADE_AT window
        const fadeProgress = Math.max(0, elapsed - (DURATION - FADE_AT)) / FADE_AT;
        ctx.globalAlpha = 1 - fadeProgress;

        // Trail: semi-transparent black overlay
        ctx.fillStyle = 'rgba(28,28,28,0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font      = `bold ${FONT_SZ}px monospace`;

        for (let i = 0; i < drops.length; i++) {
          const char = CHARS[Math.floor(Math.random() * CHARS.length)];
          const x    = i * FONT_SZ;
          const y    = drops[i] * FONT_SZ;

          // Head glyph: bright white
          ctx.fillStyle = '#e0ffe0';
          ctx.fillText(char, x, y);

          // Body glyph drawn on next tick (trail handles it via overlay)
          // Accent: random glyphs get gold highlight
          if (Math.random() < 0.04) {
            ctx.fillStyle = '#d9a441';
            ctx.fillText(char, x, y);
          } else {
            ctx.fillStyle = '#00cc44';
            ctx.fillText(char, x, y + FONT_SZ);
          }

          if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i] += 0.5;
        }

        frame = requestAnimationFrame(draw);
      }

      cancelAnimationFrame(frame);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      frame = requestAnimationFrame(draw);
    }

    // ── Multi-node terminals ─────────────────────────────────────────────────────
    function initMultiNodeTerminals(nodes) {
      const container = document.getElementById('terminal-container');
      const tabBar    = document.getElementById('terminal-tabs');
      document.getElementById('terminal-label').style.display = 'none';

      for (const node of nodes) {
        // Tab button
        const tabBtn = document.createElement('button');
        tabBtn.className   = 'terminal-tab' + (node.primary ? ' active' : '');
        tabBtn.textContent = node.name;
        tabBtn.onclick     = () => switchTab(node.name);
        tabBar.appendChild(tabBtn);

        // Pane (all panes overlap via position:absolute inset:0)
        const paneEl = document.createElement('div');
        paneEl.className = 'terminal-pane' + (node.primary ? ' active' : '');
        container.appendChild(paneEl);

        // Dedicated xterm instance per node
        const t  = new Terminal(TERM_OPTIONS);
        const fa = new FitAddon.FitAddon();
        t.loadAddon(fa);
        t.open(paneEl);
        fa.fit();

        tabs.push({ name: node.name, primary: !!node.primary, term: t, fitAddon: fa, ws: null, paneEl, tabBtn });
      }

      activeTab = tabs.find(t => t.primary) || tabs[0];

      // All panes share the same container size — re-fit all on resize
      const ro = new ResizeObserver(() => { for (const tab of tabs) tab.fitAddon.fit(); });
      ro.observe(container);
    }

    function switchTab(nodeName) {
      const tab = tabs.find(t => t.name === nodeName);
      if (!tab || tab === activeTab) return;
      if (activeTab) {
        activeTab.paneEl.classList.remove('active');
        activeTab.tabBtn.classList.remove('active');
      }
      tab.paneEl.classList.add('active');
      tab.tabBtn.classList.add('active');
      activeTab = tab;
      requestAnimationFrame(() => { tab.fitAddon.fit(); tab.term.focus(); });
    }

    function connectAllTabWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';

      for (const tab of tabs) {
        const cols  = tab.term.cols || 80;
        const rows  = tab.term.rows || 24;
        const tabWs = new WebSocket(
          `${proto}//${location.host}/ws/${sessionId}?node=${encodeURIComponent(tab.name)}&cols=${cols}&rows=${rows}`
        );
        tab.ws = tabWs;

        tabWs.onopen = () => {
          if (tab.primary) {
            hideOverlay();
            checkBtn.disabled = false;
            activeTab.fitAddon.fit();
            activeTab.term.focus();
          }
        };

        const t = tab;
        tabWs.onmessage = evt => {
          try {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'data')      t.term.write(msg.data);
            else if (msg.type === 'exit') t.term.write(`\r\n\x1b[90m[Process exited with code ${msg.exitCode}]\x1b[0m\r\n`);
          } catch (_) { t.term.write(evt.data); }
        };

        tabWs.onclose = () => {
          if (!cleanedUp) t.term.write('\r\n\x1b[90m[Connection closed]\x1b[0m\r\n');
          if (t.primary) checkBtn.disabled = true;
        };
        tabWs.onerror = () => t.term.write('\r\n\x1b[31m[WebSocket error]\x1b[0m\r\n');

        tab.term.onData(data => {
          if (tabWs.readyState === WebSocket.OPEN)
            tabWs.send(JSON.stringify({ type: 'input', data }));
        });

        tab.term.onResize(({ cols, rows }) => {
          if (tabWs.readyState === WebSocket.OPEN)
            tabWs.send(JSON.stringify({ type: 'resize', cols, rows }));
        });
      }
    }

    // ── Session readiness polling ─────────────────────────────────────────────────────
    async function waitForSession(sid, timeoutMs = 180000, intervalMs = 1500) {
      const deadline = Date.now() + timeoutMs;
      const dots = ['⣻', '⢿', '⠿', '⣿'];
      let   di   = 0;
      while (Date.now() < deadline) {
        let data;
        try {
          const r = await fetch(`/api/session/${sid}/status`);
          data = await r.json();
        } catch (_) {
          // network hiccup — keep trying
          await new Promise(r => setTimeout(r, intervalMs));
          continue;
        }
        if (data.status === 'ready')  return;
        if (data.status === 'error')  throw new Error(data.message || 'Provisioning failed');
        // still pending — show animated dots
        setStatus(`${dots[di++ % dots.length]}  Provisioning lab environment…`);
        await new Promise(r => setTimeout(r, intervalMs));
      }
      throw new Error('Timed out waiting for lab environment (3 min)');
    }

    function toggleSolution() {
      const content = document.getElementById('lab-solution');
      const label   = document.getElementById('solution-toggle-label');
      const btn     = document.getElementById('solution-toggle');
      const showing = content.style.display !== 'none';
      content.style.display = showing ? 'none' : '';
      label.textContent      = showing ? 'Show Solution' : 'Hide Solution';
      btn.classList.toggle('active', !showing);
    }

    init();
  </script>
</body>
</html>
